name: Continuous Deployment (CD)

on:
  workflow_run:
    workflows: [ "Continuous Integration (CI)" ]
    types:
      - completed
    branches:
      - main
    workflow_dispatch:

jobs:
  deploy:
    name: Test and Deploy to Heroku
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    environment:
      name: Production
      url:  https://anak-agung-ngurah-modul-375cb83346fc.herokuapp.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.14.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: false
          dontautocreate: true

      - name: Publish deploy link
        run: |
          echo "### Deployment URL" >> $GITHUB_STEP_SUMMARY
          echo "https://a-anak-agung-ngurah-modul-cea1a18f50cc.herokuapp.com/" >> $GITHUB_STEP_SUMMARY